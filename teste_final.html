<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Teste Final</title></head>
<body style="font-family:monospace;padding:20px;font-size:13px">
<h2>Teste Final - JAN 26</h2>
<pre id="r">Carregando...</pre>
<script>
const KEY='AIzaSyDGuUvLZxh8Hho5SudZgNRGkb5_HuTyfWw';
const SID='18mLImsPDkPEM-kOn6nbChDXhDd63pDCa04mKFgVZpm0';
async function go(){
  const r=document.getElementById('r');
  const d=await(await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SID+'/values/'+encodeURIComponent('JAN 26')+'?key='+KEY)).json();
  if(d.error){r.textContent='ERRO API: '+d.error.message;return;}
  const rows=d.values||[];
  let txt='Linhas: '+rows.length+'\n\n';
  // Buscar header
  let hi=-1;
  for(let i=0;i<rows.length;i++){
    const v=rows[i].map(x=>String(x||'').toUpperCase().trim());
    if(v.indexOf('FORNECEDOR')>=0 && v.indexOf('BANCO')>=0){hi=i;break;}
  }
  txt+='Header linha: '+hi+'\n';
  if(hi>=0){
    txt+='Header: '+rows[hi].slice(0,10).join(' | ')+'\n\n';
    // Contar txns
    let cnt=0,skipSK=0,skipSaldo=0,skipVazio=0;
    const SK=new Set(['Bradesco','Brasil-MB','Brasil','Santander','Asa','ASA','Safra','Sicredi','Itau','Itau','Cresol','Sicoob','Fundo Fixo','Total','Banco']);
    const hdr=rows[hi];
    let C_DEB=-1,C_CRED=-1;
    for(let j=0;j<hdr.length;j++){
      const h=String(hdr[j]||'').trim();
      if(h==='DEBITO'||h==='D\u00c9BITO'||h.toUpperCase()==='DEBITO')C_DEB=j;
      if(h==='CREDITO'||h==='CR\u00c9DITO'||h.toUpperCase()==='CREDITO')C_CRED=j;
    }
    txt+='C_DEB='+C_DEB+' C_CRED='+C_CRED+'\n\n';
    for(let i=hi+1;i<rows.length;i++){
      const row=rows[i];
      const fo=String(row[1]||'').trim();
      const hist=String(row[C_DEB>0?6:6]||'').trim();
      if(SK.has(fo)){skipSK++;continue;}
      if(hist==='SALDO DO MES ANTERIOR'||hist.includes('SALDO DO M')||hist.includes('CONFER')){skipSaldo++;continue;}
      const dia=parseInt(row[0])||0;
      const de=parseFloat(String(row[C_DEB]||'').replace(/\./g,'').replace(',','.'))||0;
      const cr=parseFloat(String(row[C_CRED]||'').replace(/\./g,'').replace(',','.'))||0;
      if(!dia&&!fo&&!hist&&de===0&&cr===0){skipVazio++;continue;}
      cnt++;
    }
    txt+='RESULTADO: '+cnt+' transacoes adicionadas\n';
    txt+='Skip SK='+skipSK+' Saldo='+skipSaldo+' Vazio='+skipVazio;
  }
  r.textContent=txt;
}
go().catch(e=>{document.getElementById('r').textContent='ERRO: '+e.message;});
</script></body></html>
