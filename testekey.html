<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Teste Key</title></head>
<body style="font-family:monospace;padding:20px">
<h2>Teste Nova API Key</h2>
<div id="r">Testando...</div>
<script>
const KEY='AIzaSyDGuUvLZxh8Hho5SudZgNRGkb5_HuTyfWw';
const SID='18mLImsPDkPEM-kOn6nbChDXhDd63pDCa04mKFgVZpm0';
fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/Dados?key=${KEY}`)
  .then(r=>r.json())
  .then(d=>{
    if(d.error) document.getElementById('r').innerHTML='<b style="color:red">ERRO: '+d.error.message+' ('+d.error.code+')</b>';
    else document.getElementById('r').innerHTML='<b style="color:green">✅ FUNCIONOU! '+((d.values||[]).length)+' linhas</b>';
  })
  .catch(e=>document.getElementById('r').innerHTML='<b style="color:red">FETCH ERRO: '+e.message+'</b>');
</script>
</body></html>
